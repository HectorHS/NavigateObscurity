{% extends 'cclab/layout.html' %}
{% load static %}

{% block styles %}
    <!-- Meta -->
    <title>Cooperation & Conflict Lab - Navigate Obscurity</title>
    <meta name="description"
        content="How do we navigate the fundamental tensions between cooperation and conflict that are inherent to social living? The Cooperation and Conflict Lab investigates these process across a variety of systems, from humans food sharing to cooperation in multicellularity and cancer.">
    <meta property="og:image"
        content="https://www.navigateobscurity.com/static/cclab/images/cooperation-conflict-lab.jpg" />
    <meta property="og:title" content="Cooperation & Conflict Lab" />
    <meta property="og:url" content="https://www.navigateobscurity.com/cooperation-conflict-lab" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:url" content="https://www.navigateobscurity.com/cooperation-conflict-lab" />
    <meta name="twitter:title" content="Cooperation & Conflict Lab" />
    <meta name="twitter:description"
        content="How do we navigate the fundamental tensions between cooperation and conflict that are inherent to social living? The Cooperation and Conflict Lab investigates these process across a variety of systems, from humans food sharing to cooperation in multicellularity and cancer." />
    <meta name="twitter:image"
        content="https://www.navigateobscurity.com/static/cclab/images/cooperation-conflict-lab.jpg" />

    <!-- We use d3 libraries to load data -->
    <script src="https://d3js.org/d3-dsv.v1.min.js"></script>
    <script src="https://d3js.org/d3-fetch.v1.min.js"></script>

    <!-- We use highcharts for visualizations -->
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/maps/modules/map.js"></script>
    <script src="https://code.highcharts.com/modules/coloraxis.js"></script>

    <script src="https://code.highcharts.com/mapdata/countries/us/us-all.js"></script>

    <script src={% static "cclab/js/chart-helpers.js" %}></script>

    <link rel='stylesheet' type="text/css" href={% static "cclab/css/highcharts.css" %}>
    {% endblock %}

    {% block content %}
<div class="data-container">
    <!-- remade us dashboard - public facing -->
    <figure style="margin-bottom:50px;">

        <div class="dashboard-container-horizontal CCLab-dashboard usdash-container">
            <h1>US cohort - Summary of findings</h1>
            <div class="dashboard-text">We surveyed a representive cohort of 921 US based participants 18 times
                between September 26th
                2020 and August 29th 2022. Here are our main findings regarding cooperation.

            </div>
            <div class="dash-stats-container1">
                <div class="dash-stats-container2">
                    <div class="dash-stat-box dash-stat-box-1">
                        <div class="dash-stat-label-container">
                            <div class="dash-stat-label"># of individuals</div>
                            <div id="us_dash_sample_state" class="cclab-stat-sublabel"></div>
                        </div>

                        <div id="us_dash_sample" class="dash-stat-value"></div>
                    </div>
                    <div class="dash-stat-box dash-stat-box-2">
                        <div class="dash-stat-label-container">
                            <div class="dash-stat-label">Average age</div>
                            <div id="us_dash_age_state" class="cclab-stat-sublabel"></div>
                        </div>
                        <div id="us_dash_age" class="dash-stat-value"></div>
                    </div>
                </div>
                <div class="dash-stats-container2">
                    <div class="dash-stat-box dash-stat-box-3">
                        <div class="dash-stat-label-container">
                            <div class="dash-stat-label">Female </div>
                            <div id="us_dash_sex_state" class="cclab-stat-sublabel"></div>
                        </div>

                        <div id="us_dash_sex" class="dash-stat-value"></div>
                    </div>
                    <div class="dash-stat-box dash-stat-box-4" >
                        <div class="dash-stat-label-container">

                            <div class="dash-stat-label">COVID-19 infected</div>
                            <div id="us_dash_covid_state" class="cclab-stat-sublabel"></div>
                        </div>

                        <div id="us_dash_covid" class="dash-stat-value"></div>
                    </div>
                </div>
            </div>
            <div class="dash-texture">
                <div class="dashboard-container-vertical dashboard-level-1">
                    <div class="dashboard-container-horizontal dashboard-side-50">
                        <div class="dash-info">We examined how people’s willingness to help others and their
                            perceived interdependence with others
                            changed during the COVID-19 pandemic. Use the map below to see how people from different
                            states
                            responded to some of our questions (graphs on the right).</div>
                        <div class="dash-attention" style="height: 60px;">
                            <div id="us_dash_state" class="yellow-font"></div>
                            <div>! Choose a state by clicking on the map</div>
                        </div>
                        <div class="chart-inset">
                            <div id="usdash_map"></div>
                        </div>
                        
                    </div>
                    <div class="dashboard-container-horizontal dashboard-side-50">
                        <div class="dashboard-container-vertical">
                            <div class="chart-inset" id="usdash_inter1"></div>
                            <div class="chart-inset" id="usdash_inter2"></div>
                        </div>
                        <div class="dashboard-container-vertical">
            
                            <div class="chart-inset" id="usdash_will1"></div>
                            <div class="chart-inset" id="usdash_will2"></div>
                        </div>
            
                    </div>
                </div>
                <div class="dash-info">
                    <div style="font-weight: 600; font-size: 120%; padding-bottom: 10px;">Explore further</div>
                    <div>See how responses changed over time for specific questions broken down by age, sex and COVID-19
                        infection</div>
                </div>
                <div class="dash-attention">
                    <div id="usdash_question" class="yellow-font"></div>
                    <div>! Choose a different question:</div>
                    <div id="usdash-question-dropdown"></div>
                </div>
                <div class="dashboard-container-vertical">
            
                    <div class="chart-inset dashboard-breakdown" id="usdash_covid"></div>
                    <div class="chart-inset dashboard-breakdown" id="usdash_age"></div>
                </div>
                <div class="dashboard-container-vertical">
                    <div class="chart-inset dashboard-breakdown" id="usdash_sex_break"></div>
                    <div class="chart-inset dashboard-breakdown" id="usdash_infected"></div>
                </div>
            
            </div>
            </div>
        <a class="cclab-button" href="https://www.cooperationintheapocalypse.org/#data">return to data</a>

    </figure>

   
    
</div>


    <script>
        var static_url = "{% get_static_prefix %}";

        file_us_map = "cclab/csv/cclab-dashus-map.csv";
        us_map_path = static_url + file_us_map;
        file_us_vars = "cclab/csv/cclab-dashus-vars.csv";
        us_vars_path = static_url + file_us_vars;
        file_us_detail = "cclab/csv/cclab-dashus-vars-detail.csv";
        us_detail_path = static_url + file_us_detail;

        var usDashboard = Promise.all([
            d3.csv(us_map_path),
            d3.csv(us_vars_path),
            d3.csv(us_detail_path)
        ]).then(function (files) {

            let all_dates2 = ["09/26/2020", "10/27/2020", "11/28/2020", "12/28/2020", "01/27/2021", "02/26/2021", "03/28/2021", "04/27/2021", "05/27/2021", "06/26/2021", "07/26/2021", "08/25/2021", "10/25/2021","12/16/2021","02/24/2022","04/25/2022","06/24/2022","08/29/2022"];
            let all_dates = ["2020-09-26", "2020-10-27", "2020-11-28", "2020-12-28", "2021-01-27", "2021-02-26", "2021-03-28", "2021-04-27", "2021-05-27", "2021-06-26", "2021-07-26", "2021-08-25", "2021-10-25", "2021-12-16", "2022-02-24", "2022-04-25", "2022-06-24", "2022-08-29"];

            // set initial values
            let state = "All states";
            // let question = "How likely do you think it is that you will contract COVID-19? (1=Not at all, 7=Extremely)";
            // let measure = "PerceptionRisk";
            let all_questions = ["If you have never been infected with COVID-19, how likely do you think it is that you will become infected with COVID-19?",
                "When my neighborhood succeeds, I feel good",
                "My neighborhood and I rise and fall together",
                "When my country succeeds, I feel good",
                "My country and I rise and fall together",
                "Someone from your neighborhood is having their house fixed, so it isn't livable. How willing would you be to let them move into your house for a week?",
                "A person who is a citizen of your own country is having their house fixed, so it isn't livable. How willing would you be to let them move into your house for a week?",
                "Helping someone from my neighborhood when they are in need is the right thing to do",
                "Helping someone who is a citizen of your own country when they are in need is the right thing to do"];
            let chart_titles = ["Average score in relation to COVID-19 prevalence",
                "Breakdown by age",
                "Breakdown by sex",
                "Breakdown by infection status"];
            let question = all_questions[0];
            let measure = getMeasureName(question);
            let scale = getResponseScale(question);

            let initial_map_data = get_map_data();
            let initial_inter1_data_hum = get_measure_array("PFIcountry1");
            let initial_inter1_data_nei = get_measure_array("PFINeigh1");
            let initial_inter2_data_hum = get_measure_array("PFIcountry6");
            let initial_inter2_data_nei = get_measure_array("PFINeigh6");
            let initial_will1_data_hum = get_measure_array("WillingnessCountry");
            let initial_will1_data_nei = get_measure_array("WillingnessNeigh");
            let initial_will2_data_hum = get_measure_array("NBTcountry");
            let initial_will2_data_nei = get_measure_array("NBTneigh");
            let initial_covid_q_data = get_measure_array(measure);
            let initial_covid_cases_data = get_measure_array("CovidCases");
            let initial_covid_deaths_data = get_measure_array("CovidDeaths");
            let initial_age1_data = getBreakdownData("Age", "18-24");
            let initial_age2_data = getBreakdownData("Age", "25-34");
            let initial_age3_data = getBreakdownData("Age", "35-44");
            let initial_age4_data = getBreakdownData("Age", "45-54");
            let initial_age5_data = getBreakdownData("Age", "55-64");
            let initial_age6_data = getBreakdownData("Age", "65+");
            let initial_sex1_data = getBreakdownData("Sex", "Male");
            let initial_sex2_data = getBreakdownData("Sex", "Female");
            let initial_sex3_data = getBreakdownData("Sex", "Other");
            let initial_infected1_data = getBreakdownData("Infected", "Covid_yes");
            let initial_infected2_data = getBreakdownData("Infected", "Covid_no");
            let initial_infected3_data = getBreakdownData("Infected", "Covid_maybe");
            setStats();
            let initial_sex_data = getSexData();
            setQuestion();

            // let initial_map_data = [{code: 	"nj", value: 453}, {code: "ri", value: 330}, {code: "ma", value: 98}];

            function get_map_data() {
                var new_data = [];
                for (let row of files[0]) {
                    var val = 0;
                    if (row.State_full != "All") {
                        val = row.Count;
                        new_data.push({ code: row.State, value: +val, originalName: row.State_full });
                    }
                }
                return new_data;
            }
            function get_measure_array(measure) {
                var new_data = [];
                for (let row of files[1]) {
                    if (row.State == state && row.Measure == measure) {
                        // new_data = [[all_dates[0],+row.t1], [all_dates[1],+row.t2], [all_dates[2],+row.t3], [all_dates[3],+row.t4], [all_dates[4],+row.t5], [all_dates[5],+row.t6], [all_dates[6],+row.t7], [all_dates[7],+row.t8], [all_dates[8],+row.t9], [all_dates[9],+row.t10], [all_dates[10],+row.t11], [all_dates[11],+row.t12]]
                        new_data = [[Date.UTC(2020, 08, 26, 0, 0, 0), +row.t1], [Date.UTC(2020, 09, 27, 0, 0, 0), +row.t2], [Date.UTC(2020, 10, 28, 0, 0, 0), +row.t3], 
                        [Date.UTC(2020, 11, 28, 0, 0, 0), +row.t4], [Date.UTC(2021, 00, 26, 0, 0, 0), +row.t5], [Date.UTC(2021, 01, 26, 0, 0, 0), +row.t6], 
                        [Date.UTC(2021, 02, 28, 0, 0, 0), +row.t7], [Date.UTC(2021, 03, 27, 0, 0, 0), +row.t8], [Date.UTC(2021, 04, 27, 0, 0, 0), +row.t9], 
                        [Date.UTC(2021, 05, 26, 0, 0, 0), +row.t10], [Date.UTC(2021, 06, 26, 0, 0, 0), +row.t11], [Date.UTC(2021, 07, 25, 0, 0, 0), +row.t12],
                        [Date.UTC(2021, 09, 25, 0, 0, 0), +row.t13], [Date.UTC(2021, 11, 16, 0, 0, 0), +row.t14], [Date.UTC(2022, 01, 24, 0, 0, 0), +row.t15],
                        [Date.UTC(2022, 03, 25, 0, 0, 0), +row.t16], [Date.UTC(2022, 05, 24, 0, 0, 0), +row.t17], [Date.UTC(2022, 07, 29, 0, 0, 0), +row.t18]]
                    }
                }

                // removing 0's
                new_data.forEach(function (element, index) {
                    if (element[1] === 0) {
                        new_data[index][1] = null;
                        }
                });
                return new_data;
            }
            function setStats() {
                let sample = 0;
                let age = 0;
                let covid = 0;
                let sex = 0;

                for (let row of files[0]) {
                    if (row.State_full == state) {
                        age = row.Age;
                        sample = row.Count;
                        covid = row.Covid_infected;
                        sex = row.Sex;
                    }
                }
                let sampleEl = document.getElementById("us_dash_sample");
                let covidEl = document.getElementById("us_dash_covid");
                let ageEl = document.getElementById("us_dash_age");

                sampleEl.innerHTML = sample;
                covidEl.innerHTML = covid;
                ageEl.innerHTML = age;

            }
            function updateCountryText() {
                let stateEl = document.getElementById("us_dash_state");
                let sampleStateEl = document.getElementById("us_dash_sample_state");
                let covidStateEl = document.getElementById("us_dash_covid_state");
                let sexStateEl = document.getElementById("us_dash_sex_state");
                let ageStateEl = document.getElementById("us_dash_age_state");

                sampleStateEl.innerHTML = "(" + state + ")";
                covidStateEl.innerHTML = "(" + state + ")";
                sexStateEl.innerHTML = "(" + state + ")";
                ageStateEl.innerHTML = "(" + state + ")";
                stateEl.innerHTML = "(" + state + ")";

                covid_chart.setTitle({text: chart_titles[0] + " (" + state + ")"});
                age_chart.setTitle({text: chart_titles[1] + " (" + state + ")"});
                sex_break_chart.setTitle({text: chart_titles[2] + " (" + state + ")"});
                infected_chart.setTitle({text: chart_titles[3] + " (" + state + ")"});            
            }
            function getSexData() {
                var new_data = [];
                let val = 0;
                let leftover = 0;
                for (let row of files[0]) {
                    if (row.State_full == state) {
                        val = +row.Sex;
                        leftover = 100 - val;
                    }
                }
                new_data.push({ name: 'female', colorIndex: 13, y: val });
                new_data.push({ name: 'other', colorIndex: 24, y: leftover });

                return new_data;
            }
            function sexDataUpdate() {
                let new_data = getSexData();
                sex_chart.series[0].setData(new_data);
            }
            function lineChartsDataUpdate() {
                let new_inter1_data_hum = get_measure_array("PFIcountry1");
                let new_inter1_data_nei = get_measure_array("PFINeigh1");
                let new_inter2_data_hum = get_measure_array("PFIcountry6");
                let new_inter2_data_nei = get_measure_array("PFINeigh6");
                let new_will1_data_hum = get_measure_array("WillingnessCountry");
                let new_will1_data_nei = get_measure_array("WillingnessNeigh");
                let new_will2_data_hum = get_measure_array("NBTcountry");
                let new_will2_data_nei = get_measure_array("NBTneigh");

                inter1_chart.series[0].setData(new_inter1_data_hum);
                inter1_chart.series[1].setData(new_inter1_data_nei);
                inter2_chart.series[0].setData(new_inter2_data_hum);
                inter2_chart.series[1].setData(new_inter2_data_nei);
                will1_chart.series[0].setData(new_will1_data_hum);
                will1_chart.series[1].setData(new_will1_data_nei);
                will2_chart.series[0].setData(new_will2_data_hum);
                will2_chart.series[1].setData(new_will2_data_nei);
            }
            function breakdownChartDataUpdate() {
                let new_covid_q_data = get_measure_array(measure);
                let new_covid_cases_data = get_measure_array("CovidCases");
                let new_covid_deaths_data = get_measure_array("CovidDeaths");
                let new_age1_data = getBreakdownData("Age", "18-24");
                let new_age2_data = getBreakdownData("Age", "25-34");
                let new_age3_data = getBreakdownData("Age", "35-44");
                let new_age4_data = getBreakdownData("Age", "45-54");
                let new_age5_data = getBreakdownData("Age", "55-64");
                let new_age6_data = getBreakdownData("Age", "65+");
                let new_sex1_data = getBreakdownData("Sex", "Male");
                let new_sex2_data = getBreakdownData("Sex", "Female");
                let new_sex3_data = getBreakdownData("Sex", "Other");
                let new_infected1_data = getBreakdownData("Infected", "Covid_yes");
                let new_infected2_data = getBreakdownData("Infected", "Covid_no");
                let new_infected3_data = getBreakdownData("Infected", "Covid_maybe");

                covid_chart.series[0].setData(new_covid_cases_data);
                covid_chart.series[1].setData(new_covid_deaths_data);
                covid_chart.series[2].setData(new_covid_q_data);
                age_chart.series[0].setData(new_age1_data);
                age_chart.series[1].setData(new_age2_data);
                age_chart.series[2].setData(new_age3_data);
                age_chart.series[3].setData(new_age4_data);
                age_chart.series[4].setData(new_age5_data);
                age_chart.series[5].setData(new_age6_data);
                sex_break_chart.series[0].setData(new_sex1_data);
                sex_break_chart.series[1].setData(new_sex2_data);
                sex_break_chart.series[2].setData(new_sex3_data);
                infected_chart.series[0].setData(new_infected1_data);
                infected_chart.series[1].setData(new_infected2_data);
                infected_chart.series[2].setData(new_infected3_data);
            }
            function setQuestion() {
                let questionEl = document.getElementById("usdash_question");
                scale = getResponseScale(question);

                questionEl.innerHTML = question + " " + scale;
            }
            function getBreakdownData(category, subcategory) {
                var new_data = [];
                for (let row of files[2]) {
                    if (row.State == state && row.Measure == measure && row.Category == category && row.Subcategory == subcategory) {
                        new_data = [[Date.UTC(2020, 08, 26, 0, 0, 0), +row.t1], [Date.UTC(2020, 09, 27, 0, 0, 0), +row.t2], [Date.UTC(2020, 10, 28, 0, 0, 0), +row.t3], 
                        [Date.UTC(2020, 11, 28, 0, 0, 0), +row.t4], [Date.UTC(2021, 00, 26, 0, 0, 0), +row.t5], [Date.UTC(2021, 01, 26, 0, 0, 0), +row.t6], 
                        [Date.UTC(2021, 02, 28, 0, 0, 0), +row.t7], [Date.UTC(2021, 03, 27, 0, 0, 0), +row.t8], [Date.UTC(2021, 04, 27, 0, 0, 0), +row.t9], 
                        [Date.UTC(2021, 05, 26, 0, 0, 0), +row.t10], [Date.UTC(2021, 06, 26, 0, 0, 0), +row.t11], [Date.UTC(2021, 07, 25, 0, 0, 0), +row.t12],
                        [Date.UTC(2021, 09, 25, 0, 0, 0), +row.t13], [Date.UTC(2021, 11, 16, 0, 0, 0), +row.t14], [Date.UTC(2022, 01, 24, 0, 0, 0), +row.t15],
                        [Date.UTC(2022, 03, 25, 0, 0, 0), +row.t16], [Date.UTC(2022, 05, 24, 0, 0, 0), +row.t17], [Date.UTC(2022, 07, 29, 0, 0, 0), +row.t18]]
                    }
                }

                // removing 0's
                new_data.forEach(function (element, index) {
                    if (element[1] === 0) {
                        new_data[index][1] = null;
                        }
                });

                return new_data;
            }

            // Initiate the map chart
            let map_chart = Highcharts.mapChart('usdash_map', {
                chart: {
                    map: 'countries/us/us-all',
                    height: 420,
                    events: {
                        click: function (e) {
                            state = "All states";
                            setStats();
                            updateCountryText();
                            sexDataUpdate();
                            lineChartsDataUpdate();
                            breakdownChartDataUpdate();
                            highlightCountry(true);
                        }
                    }
                },
                plotOptions: {
                    map: {
                        allAreas: false
                    }
                },
                title: {
                    text: null
                },
                mapNavigation: {
                    enabled: false,
                    enableMouseWheelZoom: false,
                    enableButtons: false,
                },
                colorAxis: {
                    minColor: '#fdce68',
                    maxColor: '#483E1E',
                    max: 103, // otherwise 100 gets tranctuated on the legend
                    tickInterval: 25,
                    endOnTick: false
                },
                tooltip: {
                    formatter: function () {
                        var title = fCapital(this.key);
                        var value = this.point.value;
                        return '<text><span style="font-size: 1.1em"><strong>' + title + '</strong></span><br># of people: ' + value + '</text>';
                    },
                    useHTML: true
                },
                credits: {
                    enabled: false
                },
                legend: {
                    title: {
                        text: '<div style="width: 200px; text-align: center;"># of people</div>'
                    },
                    useHTML: true, // otherwise we cannot center the title
                },
                series: [{
                    data: initial_map_data,
                    joinBy: ['postal-code', 'code'], // first var: type of geographical data, second: data column name
                    borderWidth: 0.5,
                    events: {
                        click: function (e) {
                             // if same state selected, default to all states
                             if (state == e.point.originalName) {
                                state = "All states";
                                highlightCountry(true);
                            } else {
                                state = e.point.originalName;
                                highlightCountry(false)
                            }
                            setStats();
                            updateCountryText();
                            sexDataUpdate();
                            lineChartsDataUpdate();
                            breakdownChartDataUpdate();
                        }
                    }
                }]
            });
            let inter1_chart = Highcharts.chart('usdash_inter1', {
                chart: {
                    type: 'spline',
                    height: 270,
                },
                title: {
                    align: "left",
                    text: "When my [target] succeeds, I feel good"
                },
                xAxis: {
                    type: 'datetime',
                    minPadding: 0.05,
                    maxPadding: 0.05,
                    tickPositions: [1601078400000, 1629849600000, 1661731200000],
                    labels: {
                        formatter: function () {
                                const time = new Highcharts.Time();
                                return time.dateFormat('%b %y', this.value);
                            }
                    }
                },
                yAxis: {
                    title: {
                        text: 'Average score',
                    },
                    // min: 1,
                    // max: 7,
                },
                tooltip: {
                    split: false,
                },
                plotOptions: {
                    spline: {
                        label: {
                            enabled: false
                        },
                        marker: {
                            enabled: true,
                            radius: 2,
                            symbol: 'circle'
                        },
                    },
                    series: {
                        groupPadding: 0.1,
                        color: '#FF0000'
                    }
                },
                tooltip: {
                    formatter: function () {
                        let country = numberFormatter(this.points[0].y);
                        let neigh = numberFormatter(this.points[1].y);
                        let tip = '<text><b>' + Highcharts.dateFormat('%m/%d/%Y', this.x) +
                            '</b><br/>Country: ' + country +
                            '<br/>Neighborhood: ' + neigh + '</text>';
                        return tip
                    },
                    useHTML: true,
                    shared: true
                },
                series: [
                    {
                        id: "country",
                        name: "country",
                        colorIndex: 17,
                        data: initial_inter1_data_hum,
                        label: {
                            enabled: false,
